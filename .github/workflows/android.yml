name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Configure Environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "API_KEY=" > .env
          fi

      - name: Decode or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding existing debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, generating a fresh debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamCast-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Rename APK for Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/StreamCast-alpha-v${{ github.run_number }}.apk

      - name: Generate Changelog
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          echo "## StreamCast Release v${{ github.run_number }} 🚀" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📋 What's Changed" >> release_notes.md
          echo "" >> release_notes.md
          
          # Extract commit history since last tag, or fallback to the last 15 commits
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$latest_tag" ]; then
            git log "$latest_tag..HEAD" --pretty=format:"- %s (%h)" >> release_notes.md || git log -n 15 --pretty=format:"- %s (%h)" >> release_notes.md
          else
            git log -n 15 --pretty=format:"- %s (%h)" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*Automated pre-release built from commit ${{ github.sha }} on run #${{ github.run_number }}*" >> release_notes.md

      - name: Create Alpha Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha-v${{ github.run_number }}
          name: Alpha Release v${{ github.run_number }}
          body_path: release_notes.md
          draft: false
          prerelease: true
          files: app/build/outputs/apk/debug/StreamCast-alpha-v${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
