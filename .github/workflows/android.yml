name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Configure Environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "API_KEY=" > .env
          fi

      - name: Decode or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding existing debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, generating a fresh debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Decode Release Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding release keystore..."
            python3 -c "
import os, base64
data = os.environ.get('KEYSTORE_BASE64', '').strip()
# Remove all whitespace, newlines, and carriage returns
data = ''.join(data.split())
# Recalculate and fix any truncated padding from copy-paste
data = data.rstrip('=')
missing_padding = len(data) % 4
if missing_padding == 1:
    data += '==='
elif missing_padding == 2:
    data += '=='
elif missing_padding == 3:
    data += '='
try:
    decoded = base64.b64decode(data)
    with open('app/release.jks', 'wb') as f:
        f.write(decoded)
    print('Release keystore decoded successfully using Python.')
except Exception as e:
    print('Python decoding failed, attempting standard shell fallback:', str(e))
    import subprocess
    subprocess.run('echo \"$KEYSTORE_BASE64\" | base64 -d > app/release.jks || echo \"$KEYSTORE_BASE64\" | base64 --decode > app/release.jks', shell=True)
"
          else
            echo "No KEYSTORE_BASE64 secret provided. Skipping release keystore decode."
          fi

      - name: Build APKs
        run: |
          if [ -f app/release.jks ]; then
            echo "Release keystore found. Building signed release APK..."
            gradle assembleRelease
          else
            echo "No release keystore found. Building debug APK..."
            gradle assembleDebug
          fi
        env:
          KEYSTORE_PATH: release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate and Prepare Release Artifact
        id: prepare_artifact
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "Using signed release APK..."
            echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "apk_name=StreamCast-Release-v${{ github.run_number }}.apk" >> $GITHUB_OUTPUT
          else
            echo "Using debug APK as fallback..."
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "apk_name=StreamCast-Debug-v${{ github.run_number }}.apk" >> $GITHUB_OUTPUT
          fi

      - name: Upload Built APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamCast-APK
          path: ${{ steps.prepare_artifact.outputs.apk_path }}
          retention-days: 14

      - name: Copy APK to Release Name
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          cp ${{ steps.prepare_artifact.outputs.apk_path }} app/build/outputs/apk/${{ steps.prepare_artifact.outputs.apk_name }}

      - name: Generate Changelog
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          echo "## StreamCast Release v${{ github.run_number }} 🚀" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📋 What's Changed" >> release_notes.md
          echo "" >> release_notes.md
          
          # Extract commit history since last tag, or fallback to the last 15 commits
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$latest_tag" ]; then
            git log "$latest_tag..HEAD" --pretty=format:"- %s (%h)" >> release_notes.md || git log -n 15 --pretty=format:"- %s (%h)" >> release_notes.md
          else
            git log -n 15 --pretty=format:"- %s (%h)" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*Automated pre-release built from commit ${{ github.sha }} on run #${{ github.run_number }}*" >> release_notes.md

      - name: Create Alpha Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha-v${{ github.run_number }}
          name: Alpha Release v${{ github.run_number }}
          body_path: release_notes.md
          draft: false
          prerelease: true
          files: app/build/outputs/apk/${{ steps.prepare_artifact.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
